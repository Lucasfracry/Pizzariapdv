<!DOCTYPE html>
<html>
<head>
<title>Cadastro</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="menu">

<div class="card">
<h3>Nova Pizza</h3>

<form action="/salvar_pizza" method="post">
<input name="numero" placeholder="Número" required>
<input name="nome" placeholder="Nome" required>

<select name="tamanho">
<option>Broto</option>
<option>Grande</option>
</select>

<input name="preco" type="number" step="0.01" placeholder="Preço" required>

<button>Salvar</button>
</form>

</div>

<div class="card">
<h3>Pizzas</h3>

{% for p in pizzas %}
<p>#{{p[1]}} - {{p[2]}} ({{p[3]}}) - R$ {{p[4]}}</p>
{% endfor %}
</div>

<div class="card">
<h3>Nova Borda</h3>

<form action="/salvar_borda" method="post">
<input name="nome" placeholder="Nome" required>
<input name="preco" type="number" step="0.01" placeholder="Preço" required>
<button>Salvar</button>
</form>

</div>

<a href="/">⬅ Voltar</a>

</div>

</body>
</html>
